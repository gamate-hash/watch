---
layout: none
nav: true
---

<!DOCTYPE html>
<title>{{ site.watchtitle }}</title>

<div>Last Updated on {{ site.time | date: "%Y-%m-%d %H:%M:%S" }}</div>

<ul>
  {% for page in site.pages %}
    {% if page.nav and page.url != page.url %}
      <li>
        <a href="{{ page.url }}">{{ page.title | default: page.url }}</a>
      </li>
    {% endif %}
  {% endfor %}
</ul>

---
layout: none
nav: true
---

<!DOCTYPE html>
<title>{{ site.watchtitle }}</title>

<div>Last Updated on {{ site.time | date: "%Y-%m-%d %H:%M:%S" }}</div>

<ul>
  {% for page in site.html_pages %}
    <li>
      <a href=".{{ page.url }}">
        {% if page.chnlicon %}
          <img src="{{ page.chnlicon }}" alt="icon" style="width:16px;height:16px;vertical-align:middle;">
        {% endif %}
        {{ page.abtitle | default: page.url }}
      </a>
    </li>
  {% endfor %}
</ul>
